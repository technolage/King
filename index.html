<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- عنوان الصفحة (سيُحدّث ديناميكياً) -->
    <title id="page-title">ALSHANFRICC</title>
    <meta name="description" content="مجلة ALSHANFRICC - مساحة الأناقة والمعرفة">

    <!-- رابط الخطوط الديناميكي (يُملأ حسب الخط المختار) -->
    <link id="dynamic-font-link" rel="stylesheet" href="">

    <!-- ملف التنسيقات الرئيسي -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- عرض فوري للهيكل الأساسي من localStorage -->
    <div id="instant-header"></div>
    <script>
        (function(){
            try {
                var raw = localStorage.getItem('alshanfricc_settings_cache');
                if (raw) {
                    var s = JSON.parse(raw).settings;
                    if (s) {
                        var header = document.getElementById('instant-header');
                        if (header) {
                            header.innerHTML = '<div style="background:rgba(0,0,0,0.4);color:white;padding:12px 20px;font-size:1.8rem;font-weight:bold;text-align:center;backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:1000;">'+(s.siteName||'ALSHANFRICC')+'</div>';
                            document.body.style.paddingTop = '60px';
                        }
                        document.documentElement.style.setProperty('--primary', s.primaryColor||'#c48b4c');
                        document.body.style.fontFamily = (s.bodyFont||'Cairo')+', sans-serif';
                    }
                }
            }catch(e){}
        })();
    </script>

    <!-- ============================================================
         1. الهيدر (الشريط العلوي)
         سيتم بناؤه بالكامل عبر header.js
         ============================================================ -->
    <header id="site-header">
        <!-- المحتوى يظهر هنا تلقائياً -->
    </header>

    <!-- ============================================================
         2. المحتوى الرئيسي (البدي)
         ============================================================ -->
    <main class="main-layout">
        <section id="posts-feed" class="feed">
            <!-- المقالات تظهر هنا عبر body.js -->
        </section>

        <aside class="right-sidebar">
            <div class="sticky-widget">
                <h4>روابط سريعة</h4>
                <div id="sidebar-buttons">
                    <!-- أزرار مخصصة من الإعدادات -->
                </div>
            </div>
        </aside>
    </main>

    <!-- ============================================================
         3. الفوتر (التذييل)
         سيتم بناؤه عبر footer.js
         ============================================================ -->
    <footer id="site-footer">
        <!-- المحتوى يظهر هنا تلقائياً -->
    </footer>

    <!-- ============================================================
         4. مكتبات Firebase
         ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <!-- ============================================================
         5. ملفات JavaScript الخاصة بالمشروع (بالترتيب)
         ============================================================ -->
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/body.js"></script>
    <script src="assets/js/footer.js"></script>

    <!-- ============================================================
         6. بدء التشغيل وتحميل الخط المناسب
         ============================================================ -->
    <script>
        (function() {
            // تحميل الخط المناسب من localStorage أو الافتراضي
            const savedFont = localStorage.getItem('selectedFont') || 'Cairo';
            const link = document.getElementById('dynamic-font-link');
            link.href = `https://fonts.googleapis.com/css2?family=${savedFont.replace(/ /g, '+')}:wght@400;700&display=swap`;
            document.body.style.fontFamily = savedFont + ', sans-serif';
        })();

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // بناء جميع أجزاء الصفحة
                await buildHeader();
                await loadPosts(1);
                await buildFooter();

                // تحديث عنوان الصفحة
                const siteName = await getSetting('siteName', 'ALSHANFRICC');
                document.getElementById('page-title').textContent = siteName;

                // إزالة الهيدر المؤقت
                const instant = document.getElementById('instant-header');
                if (instant) instant.style.display = 'none';

                // بدء تدوير خلفيات الموقع
                const bgImages = await getSetting('backgroundImages', []);
                const bgInterval = parseInt(await getSetting('backgroundInterval', '60')) || 60;
                if (bgImages.length > 0) {
                    let currentBgIndex = 0;
                    document.body.style.backgroundImage = `url('${bgImages[0]}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                    setInterval(() => {
                        currentBgIndex = (currentBgIndex + 1) % bgImages.length;
                        document.body.style.backgroundImage = `url('${bgImages[currentBgIndex]}')`;
                    }, bgInterval * 1000);
                }

                console.log('✅ تم تحميل الموقع بنجاح');

            } catch (error) {
                console.error('❌ خطأ في تحميل الموقع:', error);
            }

            // فتح مقال محدد من الرابط ?post=...
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('post');
            if (postId) {
                setTimeout(() => {
                    const el = document.getElementById(`post-${postId}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.style.boxShadow = '0 0 0 3px var(--primary)';
                        setTimeout(() => el.style.boxShadow = '', 3000);
                    }
                }, 2000);
            }
        });
    </script>

</body>
</html>
