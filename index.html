<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- عنوان الصفحة (سيُحدّث ديناميكياً) -->
    <title id="page-title">ALSHANFRICC</title>
    <meta name="description" content="مجلة ALSHANFRICC - مساحة الأناقة والمعرفة">

    <!-- رابط الخطوط الديناميكي (يُملأ حسب الخط المختار) -->
    <link id="dynamic-font-link" rel="stylesheet" href="">

    <!-- ملف التنسيقات الرئيسي -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- ============================================================
         1. الهيدر (الشريط العلوي)
         سيتم بناؤه بالكامل عبر header.js
         ============================================================ -->
    <header id="site-header">
        <!-- المحتوى يظهر هنا تلقائياً -->
    </header>

    <!-- ============================================================
         2. المحتوى الرئيسي (البدي)
         ============================================================ -->
    <main class="main-layout">
        <section id="posts-feed" class="feed">
            <!-- المقالات تظهر هنا عبر body.js -->
        </section>

        <aside class="right-sidebar">
            <div class="sticky-widget">
                <h4>روابط سريعة</h4>
                <div id="sidebar-buttons">
                    <!-- أزرار مخصصة من الإعدادات -->
                </div>
            </div>
        </aside>
    </main>

    <!-- ============================================================
         3. الفوتر (التذييل)
         سيتم بناؤه عبر footer.js
         ============================================================ -->
    <footer id="site-footer">
        <!-- المحتوى يظهر هنا تلقائياً -->
    </footer>

    <!-- ============================================================
         4. مكتبات Firebase
         ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <!-- ============================================================
         5. ملفات JavaScript الخاصة بالمشروع (بالترتيب)
         ============================================================ -->
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/body.js"></script>
    <script src="assets/js/footer.js"></script>

    <!-- ============================================================
         6. بدء التشغيل وتحميل الخط المناسب
         ============================================================ -->
    <script>
        (function() {
            // تحميل الخط المناسب من localStorage أو الافتراضي
            const savedFont = localStorage.getItem('selectedFont') || 'Cairo';
            const link = document.getElementById('dynamic-font-link');
            link.href = `https://fonts.googleapis.com/css2?family=${savedFont.replace(/ /g, '+')}:wght@400;700&display=swap`;
            document.body.style.fontFamily = savedFont + ', sans-serif';
        })();

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // بناء جميع أجزاء الصفحة
                await buildHeader();
                await loadPosts(false);
                await buildFooter();

                // تحديث عنوان الصفحة
                const siteName = await getSetting('siteName', 'ALSHANFRICC');
                document.getElementById('page-title').textContent = siteName;

                console.log('✅ تم تحميل الموقع بنجاح');
            } catch (error) {
                console.error('❌ خطأ في تحميل الموقع:', error);
            }

            // فتح مقال محدد من الرابط ?post=...
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('post');
            if (postId) {
                setTimeout(() => {
                    const el = document.getElementById(`post-${postId}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.style.boxShadow = '0 0 0 3px var(--primary)';
                        setTimeout(() => el.style.boxShadow = '', 3000);
                    }
                }, 2000);
            }
        });
    </script>

</body>
</html>
