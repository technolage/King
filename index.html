<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSHANFRICC - التقنية والهواتف الذكية</title>
    <meta name="description" content="موقع متخصص في التقنية والهواتف الذكية - مراجعات، أخبار، مقارنات، وتطبيقات">
    <meta name="keywords" content="تقنية, هواتف, موبايلات, آيفون, سامسونج, أندرويد, تطبيقات, مراجعات">
    <meta property="og:title" content="ALSHANFRICC - التقنية والهواتف">
    <meta property="og:description" content="موقع متخصص في التقنية والهواتف الذكية">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ar_SA">
    <link rel="canonical" href="https://kings591998.github.io/King/">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">ALSHANFRICC</div>
            <div class="preloader-bar-container">
                <div class="preloader-bar" id="preloader-bar"></div>
            </div>
            <div class="preloader-number" id="preloader-number">0%</div>
            <div class="preloader-dots">
                <span>.</span><span>.</span><span>.</span>
            </div>
        </div>
    </div>

    <!-- الهيدر -->
    <header id="site-header"></header>

    <!-- المحتوى الرئيسي -->
    <main class="main-layout">
        <section id="posts-feed" class="feed">
            <div class="loading-spinner">⏳ جاري تحميل المقالات...</div>
        </section>
        
        <aside class="right-sidebar">
            <div class="sticky-widget">
                <h4> إحصائيات</h4>
                <div id="stats-widget">
                    <p>📝 المقالات: <span id="total-posts">0</span></p>
                    <p>👁️ المشاهدات: <span id="total-views">0</span></p>
                </div>
            </div>
            
            <div class="sticky-widget" style="margin-top: 20px;">
                <h4>🏷️ التصنيفات</h4>
                <div id="categories-widget"></div>
            </div>
        </aside>
    </main>

    <!-- الفوتر -->
    <footer id="site-footer"></footer>

    <!-- أزرار التمرير -->
    <button id="backToTop" class="scroll-btn back-to-top-btn" onclick="scrollToTop()" style="display:none;">⬆️</button>

    <!-- JavaScript -->
    <script src="assets/js/github-api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/body.js"></script>
    <script src="assets/js/footer.js"></script>

    <script>
        // تحميل المقالات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // إخفاء شاشة التحميل
                setTimeout(() => {
                    const preloader = document.getElementById('preloader');
                    if (preloader) {
                        preloader.style.opacity = '0';
                        setTimeout(() => preloader.remove(), 500);
                    }
                }, 1000);

                // تحميل المقالات
                await loadAllPosts();
                
                // بناء الهيدر والفوتر
                if (typeof buildHeader === 'function') await buildHeader();
                if (typeof buildFooter === 'function') await buildFooter();
                
            } catch (error) {
                console.error('خطأ في تحميل الصفحة:', error);
                document.getElementById('posts-feed').innerHTML = 
                    '<div class="error-message">⚠️ حدث خطأ في تحميل المقالات</div>';
            }
        });

        // التمرير للأعلى
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // إظهار زر العودة للأعلى
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
